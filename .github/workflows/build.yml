name: Build and Release
run-name: ${{ github.event.inputs.ksu_source }}
on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release Title"
        required: true
        default: "Midori Kernel"
      ksu_source:
        description: "KernelSU Source"
        type: choice
        required: true
        default: "backslashxx/KernelSU:master"
        options:
          - "MidoriKSU/KernelSU:main"
          - "backslashxx/KernelSU:master"
          - "backslashxx/KernelSU:staging"
      hook_mode:
        description: "Hook Mode"
        type: choice
        required: true
        default: "hybridized"
        options:
          - manual
          - hybridized
          - hookless-TAMPER_SYSCALL_TABLE
          - hookless-HACK_ARM64_BRANCH_LINK
      ksu_manager:
        description: "Manager"
        type: choice
        required: true
        default: "MidoriSU"
        options:
          - MidoriSU
          - KernelSU
      droidspaces:
        description: "Droidspaces"
        type: choice
        required: true
        default: "6_7_8"
        options:
          - disable
          - "6_7_8"
          - "4_5_6"
          - "1_2_3"
      use_ccache:
        description: "Ccache Speedup"
        type: boolean
        required: true
        default: true
      upload_vmlinux:
        description: "Upload vmlinux"
        type: boolean
        required: true
        default: false

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up build environment and ccache
        run: |
          sudo apt update
          sudo apt install -yq ccache clang golang build-essential lld gcc-aarch64-linux-gnu zip unzip curl git zstd
          if [ "${{ github.event.inputs.use_ccache }}" == "true" ]; then
            ccache -M 10G
            ccache -z
            echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
            echo "USE_CCACHE=1" >> $GITHUB_ENV
            echo "CCACHE_COMPILERCHECK=content" >> $GITHUB_ENV
            echo "CCACHE_SLOPPINESS=file_macro,include_file_mtime,time_macros" >> $GITHUB_ENV
          else
            echo "USE_CCACHE=0" >> $GITHUB_ENV
          fi

      - name: Restore Cache
        id: cache-restore
        uses: actions/cache/restore@v5
        with:
          path: |
            clang
            ${{ github.event.inputs.use_ccache == 'true' && '.ccache' || '' }}
          key: toolchain-${{ runner.os }}-r530567-${{ github.event.inputs.ksu_source }}-${{ github.event.inputs.hook_mode }}-${{ github.event.inputs.droidspaces }}-${{ github.run_id }}
          restore-keys: |
            toolchain-${{ runner.os }}-r530567-${{ github.event.inputs.ksu_source }}-${{ github.event.inputs.hook_mode }}-${{ github.event.inputs.droidspaces }}-
            toolchain-${{ runner.os }}-r530567-${{ github.event.inputs.ksu_source }}-${{ github.event.inputs.hook_mode }}-
            toolchain-${{ runner.os }}-r530567-

      - name: Fetch AOSP Clang
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/${{ github.repository }}/releases/download/toolchain/clang-r530567.tar.gz -O aosp-clang.tar.gz
          tar -xf aosp-clang.tar.gz -C ${{ github.workspace }} --one-top-level=clang

      - name: Set up KernelSU
        id: ksu_setup
        run: |
          IFS=':' read -r KSU_REPO KSU_BRANCH <<< "${{ github.event.inputs.ksu_source }}"
          curl -LSs "https://raw.githubusercontent.com/${KSU_REPO}/${KSU_BRANCH}/kernel/setup.sh" | bash -s ${KSU_BRANCH}
          cd KernelSU
          echo "ksu_repo=${KSU_REPO}" >> $GITHUB_OUTPUT
          echo "ksu_branch=${KSU_BRANCH}" >> $GITHUB_OUTPUT
          echo "ksu_commit=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
          echo "ksu_full_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "ksu_date=$(git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M:%S %z' | sed 's/\([+-][0-9]\{2\}\)\([0-9]\{2\}\)/\1:\2/')" >> $GITHUB_OUTPUT

      - name: Configure Hook Mode
        run: |
          echo "[+] Configuring Hook Mode..."
          if [ "${{ github.event.inputs.hook_mode }}" = "manual" ]; then
            echo "[+] Hook Mode: Manual Hooks"
            echo "# CONFIG_KSU_KPROBES_KSUD is not set" >> arch/arm64/configs/o1q_defconfig
            echo "[+] Applying scope-minimized-manual-hooks patch..."
            patch -p1 < .github/patches/scope-minimized-manual-hooks-v2.2.patch
            echo "[✓] Manual hooks configuration applied"
          elif [ "${{ github.event.inputs.hook_mode }}" = "hybridized" ]; then
            echo "[+] Hook Mode: Hybridized Manual Hooks"
            echo "[+] Applying scope-minimized-manual-hooks patch..."
            patch -p1 < .github/patches/scope-minimized-manual-hooks-v2.2.patch
            echo "[✓] Hybridized manual hooks configuration applied"
          elif [ "${{ github.event.inputs.hook_mode }}" = "hookless-TAMPER_SYSCALL_TABLE" ]; then
            echo "[+] Hook Mode: Hookless (TAMPER_SYSCALL_TABLE)"
            echo "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" >> arch/arm64/configs/o1q_defconfig
            echo "# CONFIG_CFI_CLANG is not set" >> arch/arm64/configs/o1q_defconfig
            echo "[✓] Hookless TAMPER_SYSCALL_TABLE configuration applied"
          elif [ "${{ github.event.inputs.hook_mode }}" = "hookless-HACK_ARM64_BRANCH_LINK" ]; then
            echo "[+] Hook Mode: Hookless (HACK_ARM64_BRANCH_LINK)"
            echo "CONFIG_KSU_HACK_ARM64_BRANCH_LINK=y" >> arch/arm64/configs/o1q_defconfig
            echo "# CONFIG_CFI_CLANG is not set" >> arch/arm64/configs/o1q_defconfig
            echo "[✓] Hookless HACK_ARM64_BRANCH_LINK configuration applied"
          fi
          echo "[✓] Hook Mode configuration completed successfully!"

      - name: Apply Droidspaces Patches
        if: github.event.inputs.droidspaces != 'disable'
        run: |
          PATCH_FILE="001.GKI-below-6.12-fix_sysvipc_kabi_${{ github.event.inputs.droidspaces }}.patch"
          echo "[+] Applying patch: ${PATCH_FILE}"
          patch -p1 < .github/patches/${PATCH_FILE}
          echo "[+] Applying patch: 003.5.4_use_android_abi_padding_for_posix_mqueue.patch"
          patch -p1 < .github/patches/003.5.4_use_android_abi_padding_for_posix_mqueue.patch
          echo "[+] Enabling DroidSpaces kernel config options..."
          echo "CONFIG_SYSVIPC=y" >> arch/arm64/configs/o1q_defconfig
          echo "CONFIG_POSIX_MQUEUE=y" >> arch/arm64/configs/o1q_defconfig
          echo "CONFIG_IPC_NS=y" >> arch/arm64/configs/o1q_defconfig
          echo "CONFIG_PID_NS=y" >> arch/arm64/configs/o1q_defconfig
          echo "CONFIG_DEVTMPFS=y" >> arch/arm64/configs/o1q_defconfig
          echo "[✓] Droidspaces patches and kernel config applied successfully!"

      - name: Apply Midori Customization
        if: ${{ github.event.inputs.ksu_manager == 'MidoriSU' }}
        run: |
          echo "[+] Starting Midori customization..."
          echo "[+] Fetching commit count from MidoriSU repository..."
          COMMIT_COUNT=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/midori01/KernelSU/commits?per_page=1" -I 2>&1 | grep "link:" | grep -oP '&page=\K\d+(?=>; rel="last")')
          if [ -z "$COMMIT_COUNT" ]; then
            echo "[!] Failed to fetch commit count, using default value 0"
            COMMIT_COUNT=0
          else
            echo "[✓] Commit count retrieved: $COMMIT_COUNT"
          fi
          NEW_KSU_VERSION=$((30000 + ${COMMIT_COUNT}))
          echo "[+] Calculated KSU_VERSION: $NEW_KSU_VERSION"
          echo "[+] Updating KSU_VERSION in Makefile..."
          sed -i "s/-DKSU_VERSION=[0-9]*/-DKSU_VERSION=$NEW_KSU_VERSION/g" KernelSU/kernel/Makefile
          echo "[✓] KSU_VERSION updated to $NEW_KSU_VERSION in Makefile"
          echo "[+] Patching APK signature verification..."
          sed -i 's/unsigned char buffer\[0x11\] = { 0 };/return true;\n\tunsigned char buffer[0x11] = { 0 };/g' KernelSU/kernel/manager/apk_sign.c
          echo "[✓] Added early return true to bypass signature check"
          echo "[+] Replacing is_manager_apk function..."
          sed -i '/bool is_manager_apk(char \*path)/,$d' KernelSU/kernel/manager/apk_sign.c
          echo -e 'bool is_manager_apk(char *path)\n{\n\tchar pkg[KSU_MAX_PACKAGE_NAME];\n\tif (get_pkg_from_apk_path(pkg, path) < 0) {\n\t\treturn false;\n\t}\n\treturn strcmp(pkg, "com.midori.supermanager") == 0;\n}' >> KernelSU/kernel/manager/apk_sign.c
          echo "[✓] is_manager_apk function replaced with MidoriSU package check"
          echo "[✓] Midori customization completed successfully!"
          echo "[+] Summary:"
          echo "    - KSU_VERSION: $NEW_KSU_VERSION"
          echo "    - Manager package: com.midori.supermanager"
          echo "    - Signature verification: bypassed"

      - name: Build Kernel
        run: |
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          export KBUILD_BUILD_USER=midori
          export KBUILD_BUILD_HOST=build-host
          export KBUILD_BUILD_TIMESTAMP="Mon May 05 05:05:05 KST 2025"
          if [ "${{ github.event.inputs.use_ccache }}" == "true" ]; then
            CC_WRAPPER="ccache clang"
            export CCACHE_COMPILERCHECK=content
            export CCACHE_SLOPPINESS=file_macro,include_file_mtime,time_macros
          else
            CC_WRAPPER="clang"
          fi
          make -j$(nproc) -C $(pwd) O=$(pwd)/out ARCH=arm64 CC="$CC_WRAPPER" CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- o1q_defconfig
          make -j$(nproc) -C $(pwd) O=$(pwd)/out ARCH=arm64 CC="$CC_WRAPPER" CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc) -C $(pwd) O=$(pwd)/out ARCH=arm64 CC="$CC_WRAPPER" CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- INSTALL_MOD_PATH=modules INSTALL_MOD_STRIP=1 modules_install
          if [ "${{ github.event.inputs.use_ccache }}" == "true" ]; then
            ccache -s
          fi

      - name: Export vmlinux
        if: github.event.inputs.upload_vmlinux == 'true'
        working-directory: out
        run: |
          if [ -f "vmlinux" ]; then
            zstd -T0 -10 vmlinux -o vmlinux.zst
            echo "VMLINUX_SIZE=$(du -h vmlinux.zst | cut -f1)" >> $GITHUB_ENV
          else
            echo "::warning::vmlinux not found in out directory"
            exit 1
          fi

      - name: Upload vmlinux Artifact
        if: github.event.inputs.upload_vmlinux == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: vmlinux-${{ steps.ksu_setup.outputs.ksu_commit }}
          path: out/vmlinux.zst
          retention-days: 7

      - name: Package AnyKernel3
        run: |
          git clone https://github.com/midori01/AnyKernel3 -b samsung --depth 1 AnyKernel3
          mkdir -p AnyKernel3/modules/vendor/lib/modules/
          find out/modules -type f -iname "*.ko" -exec cp -r {} AnyKernel3/modules/vendor/lib/modules/ \;
          cp out/arch/arm64/boot/Image out/arch/arm64/boot/dtbo.img AnyKernel3/
          cd AnyKernel3 && zip -r9 ../Kernel-5.4.274_$(TZ='Asia/Tokyo' date +%Y%m%d-%H%M).zip . -x '*.git*' '*patch*' '*ramdisk*' 'LICENSE' 'README.md'

      - name: Save Cache
        uses: actions/cache/save@v5
        with:
          path: |
            clang
            ${{ github.event.inputs.use_ccache == 'true' && '.ccache' || '' }}
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Kernel
          path: ./*.zip

      - name: Generate Release Body
        id: release_body
        run: |
          cat > release_body.md << EOF
          ## 📦 Build Information
          - 🕐 **Build Date**: \`$(TZ='Asia/Tokyo' date +'%Y-%m-%d %H:%M:%S +09:00')\`
          - 📌 **KSU Source**: [\`${{ github.event.inputs.ksu_source }}\`](https://github.com/${{ steps.ksu_setup.outputs.ksu_repo }}/tree/${{ steps.ksu_setup.outputs.ksu_branch }})
          - 🔖 **Commit**: [\`${{ steps.ksu_setup.outputs.ksu_commit }}\`](https://github.com/${{ steps.ksu_setup.outputs.ksu_repo }}/commit/${{ steps.ksu_setup.outputs.ksu_full_commit }}) \`${{ steps.ksu_setup.outputs.ksu_date }}\`
          - ⚙️ **Hook Mode**: \`${{ github.event.inputs.hook_mode == 'manual' && 'Manual Hooks' || github.event.inputs.hook_mode == 'hybridized' && 'Hybridized Manual Hooks' || github.event.inputs.hook_mode == 'hookless-TAMPER_SYSCALL_TABLE' && 'Hookless (TAMPER_SYSCALL_TABLE)' || github.event.inputs.hook_mode == 'hookless-HACK_ARM64_BRANCH_LINK' && 'Hookless (HACK_ARM64_BRANCH_LINK)' || github.event.inputs.hook_mode }}\`
          - 📱 **Manager**: \`${{ github.event.inputs.ksu_manager }}\`
          - 🛡️ **Droidspaces**: \`${{ github.event.inputs.droidspaces == 'disable' && 'Disabled' || format('Enabled ({0})', github.event.inputs.droidspaces) }}\`
          - 🚀 **Ccache Speedup**: \`${{ github.event.inputs.use_ccache == 'true' && 'Enabled' || 'Disabled' }}\`
          EOF
          echo "body_path=release_body.md" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          files: ./*.zip
          name: ${{ github.event.inputs.release_name }}
          tag_name: CI_${{ github.run_id }}
          body_path: ${{ steps.release_body.outputs.body_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
