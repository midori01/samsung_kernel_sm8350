name: Build and Release
run-name: ${{ github.event.inputs.ksu_source }}
on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release Title"
        required: true
        default: "Midori Kernel"
      ksu_source:
        description: "KSU Source"
        type: choice
        required: true
        default: "backslashxx/KernelSU:master"
        options:
          - "MidoriKSU/KernelSU:main"
          - "backslashxx/KernelSU:master"
          - "backslashxx/KernelSU:staging"
      hook_mode:
        description: "Hook Mode"
        type: choice
        required: true
        default: "hybridized"
        options:
          - manual
          - hybridized
          - hookless
      ksu_manager:
        description: "Manager"
        type: choice
        required: true
        default: "MidoriSU"
        options:
          - MidoriSU (com.midori.supermanager)
          - KernelSU (me.weishu.kernelsu)

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up build environment and ccache
        run: |
          sudo apt update
          sudo apt install -yq ccache clang golang build-essential lld gcc-aarch64-linux-gnu zip unzip curl git
          ccache -M 10G
          ccache -z
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
          echo "USE_CCACHE=1" >> $GITHUB_ENV

      - name: Cache Clang and ccache
        id: cache-toolchain
        uses: actions/cache@v5
        with:
          path: |
            clang
            .ccache
          key: toolchain-${{ runner.os }}-r530567-${{ github.sha }}
          restore-keys: |
            toolchain-${{ runner.os }}-r530567-

      - name: Fetch AOSP Clang
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/${{ github.repository }}/releases/download/toolchain/clang-r530567.tar.gz -O aosp-clang.tar.gz
          tar -xf aosp-clang.tar.gz -C ${{ github.workspace }} --one-top-level=clang

      - name: Set up KernelSU
        id: ksu_setup
        run: |
          IFS=':' read -r KSU_REPO KSU_BRANCH <<< "${{ github.event.inputs.ksu_source }}"
          curl -LSs "https://raw.githubusercontent.com/${KSU_REPO}/${KSU_BRANCH}/kernel/setup.sh" | bash -s ${KSU_BRANCH}
          cd KernelSU
          echo "ksu_repo=${KSU_REPO}" >> $GITHUB_OUTPUT
          echo "ksu_branch=${KSU_BRANCH}" >> $GITHUB_OUTPUT
          echo "ksu_commit=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
          echo "ksu_full_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "ksu_date=$(git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M:%S %z' | sed 's/\([+-][0-9]\{2\}\)\([0-9]\{2\}\)/\1:\2/')" >> $GITHUB_OUTPUT

      - name: Configure Hook Mode
        run: |
          if [ "${{ github.event.inputs.hook_mode }}" = "manual" ]; then
            echo "# CONFIG_KSU_KPROBES_KSUD is not set" >> arch/arm64/configs/o1q_defconfig
            patch -p1 < .github/patches/scope-minimized-manual-hooks-v2.2.patch
          elif [ "${{ github.event.inputs.hook_mode }}" = "hybridized" ]; then
            patch -p1 < .github/patches/scope-minimized-manual-hooks-v2.2.patch
          else
            echo "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" >> arch/arm64/configs/o1q_defconfig
          fi

      - name: Apply Midori Customization
        if: ${{ github.event.inputs.ksu_manager == 'MidoriSU' }}
        run: |
          COMMIT_COUNT=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/midori01/KernelSU/commits?per_page=1" -I 2>&1 | grep "link:" | grep -oP '&page=\K\d+(?=>; rel="last")') && NEW_KSU_VERSION=$((30000 + ${COMMIT_COUNT:-0}))
          sed -i "s/-DKSU_VERSION=[0-9]*/-DKSU_VERSION=$NEW_KSU_VERSION/g" KernelSU/kernel/Makefile
          sed -i '/bool is_manager_apk(char \*path)/,$d' KernelSU/kernel/manager/apk_sign.c
          echo -e 'bool is_manager_apk(char *path)\n{\n\tchar pkg[KSU_MAX_PACKAGE_NAME];\n\tif (get_pkg_from_apk_path(pkg, path) < 0) {\n\t\treturn false;\n\t}\n\treturn strcmp(pkg, "com.midori.supermanager") == 0;\n}' >> KernelSU/kernel/manager/apk_sign.c

      - name: Build Kernel
        run: |
          export PATH="${{ github.workspace }}/clang/bin:$PATH"
          make -j$(nproc) -C $(pwd) O=$(pwd)/out ARCH=arm64 CC="ccache clang" CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- o1q_defconfig
          make -j$(nproc) -C $(pwd) O=$(pwd)/out ARCH=arm64 CC="ccache clang" CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 CROSS_COMPILE=aarch64-linux-gnu-
          make -j$(nproc) -C $(pwd) O=$(pwd)/out ARCH=arm64 CC="ccache clang" CLANG_TRIPLE=aarch64-linux-gnu- LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- INSTALL_MOD_PATH=modules INSTALL_MOD_STRIP=1 modules_install
          ccache -s

      - name: Package AnyKernel3
        run: |
          git clone https://github.com/midori01/AnyKernel3 -b samsung --depth 1 AnyKernel3
          mkdir -p AnyKernel3/modules/vendor/lib/modules/
          find out/modules -type f -iname "*.ko" -exec cp -r {} AnyKernel3/modules/vendor/lib/modules/ \;
          cp out/arch/arm64/boot/Image out/arch/arm64/boot/dtbo.img AnyKernel3/
          cd AnyKernel3 && zip -r9 ../Kernel-5.4.274_$(TZ='Asia/Tokyo' date +%Y%m%d-%H%M).zip . -x '*.git*' '*patch*' '*ramdisk*' 'LICENSE' 'README.md'

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Kernel
          path: ./*.zip

      - name: Generate Release Body
        id: release_body
        run: |
          cat > release_body.md << EOF
          ## 📦 Build Information
          - 🕐 **Build Date**: \`$(TZ='Asia/Tokyo' date +'%Y-%m-%d %H:%M:%S +09:00')\`
          - 📌 **KSU Source**: [\`${{ github.event.inputs.ksu_source }}\`](https://github.com/${{ steps.ksu_setup.outputs.ksu_repo }}/tree/${{ steps.ksu_setup.outputs.ksu_branch }})
          - 🔖 **Commit**: [\`${{ steps.ksu_setup.outputs.ksu_commit }}\`](https://github.com/${{ steps.ksu_setup.outputs.ksu_repo }}/commit/${{ steps.ksu_setup.outputs.ksu_full_commit }}) \`${{ steps.ksu_setup.outputs.ksu_date }}\`
          - ⚙️ **Hook Mode**: \`${{ github.event.inputs.hook_mode == 'manual' && 'Manual Hooks' || github.event.inputs.hook_mode == 'hybridized' && 'Hybridized Manual Hooks' || 'Hookless' }}\`
          - 📱 **Manager**: \`${{ github.event.inputs.ksu_manager }}\`
          EOF
          echo "body_path=release_body.md" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          files: ./*.zip
          name: ${{ github.event.inputs.release_name }}
          tag_name: CI_${{ github.run_id }}
          body_path: ${{ steps.release_body.outputs.body_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
